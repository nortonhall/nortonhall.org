<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norton Hall</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#ede4d4;
  --ink:#1a1510;
  --rule:#c8b89a;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#e8dcc8;
  color:var(--ink);
  font-family:'EB Garamond', Georgia, serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:2rem;
}

.container{
  max-width:640px;
}

.mark{
  font-size:0.9rem;
  font-weight:700;
  margin-bottom:1.2rem;
}

h1{
  font-weight:400;
  font-size:1.7rem;
  margin-bottom:0.8rem;
  font-style:italic;
}

p{
  font-size:0.95rem;
  line-height:1.7;
  margin-bottom:1.2rem;
}

.rule{
  height:1px;
  background:var(--rule);
  margin:2rem auto;
  width:120px;
}

.footer{
  font-size:0.65rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#6d5e4f;
}

</style>
</head>

<body>

<div class="container">

<div class="mark">⁂</div>

<h1>Norton Hall</h1>

<p>The Norton Hall website is currently undergoing development.</p>

<p>Please check back shortly.</p>

<div class="rule"></div>

<div class="footer">© Norton Hall 2026</div>

</div>

</body>
</html>
